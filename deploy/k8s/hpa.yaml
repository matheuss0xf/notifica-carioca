apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notifica-carioca-api
  namespace: notifica-carioca
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notifica-carioca-api
  minReplicas: 1
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
