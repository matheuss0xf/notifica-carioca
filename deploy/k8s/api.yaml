apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifica-carioca-api
  namespace: notifica-carioca
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifica-carioca-api
  template:
    metadata:
      labels:
        app: notifica-carioca-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: api
          image: notifica-carioca:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notifica-carioca-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notifica-carioca-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: notifica-carioca-secrets
                  key: REDIS_URL
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: notifica-carioca-secrets
                  key: WEBHOOK_SECRET
            - name: CPF_HASH_KEY
              valueFrom:
                secretKeyRef:
                  name: notifica-carioca-secrets
                  key: CPF_HASH_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: notifica-carioca-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notifica-carioca-api
  namespace: notifica-carioca
spec:
  selector:
    app: notifica-carioca-api
  ports:
    - port: 8080
      targetPort: 8080
