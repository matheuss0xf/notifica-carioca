apiVersion: v1
kind: ConfigMap
metadata:
  name: notifica-carioca-config
  namespace: notifica-carioca
data:
  SERVER_PORT: "8080"
  SHUTDOWN_TIMEOUT: "10s"
  READ_HEADER_TIMEOUT: "5s"
  READ_TIMEOUT: "15s"
  WRITE_TIMEOUT: "30s"
  IDLE_TIMEOUT: "60s"
  WS_ALLOWED_ORIGINS: ""
  RATE_LIMIT_WINDOW: "1m"
  WEBHOOK_RATE_LIMIT: "60"
  NOTIFICATIONS_RATE_LIMIT: "120"
  WEBSOCKET_RATE_LIMIT: "30"
  ENABLE_HSTS: "false"
  HSTS_MAX_AGE_SECONDS: "31536000"
  IDEMPOTENCY_TTL: "24h"
  UNREAD_CACHE_TTL: "1h"
  WEBHOOK_DLQ_KEY: "webhook:dlq"
  WEBHOOK_DLQ_MAX_LEN: "1000"
  POSTGRES_CB_FAILURE_THRESHOLD: "5"
  POSTGRES_CB_OPEN_TIMEOUT: "30s"
  REDIS_CB_FAILURE_THRESHOLD: "5"
  REDIS_CB_OPEN_TIMEOUT: "30s"
